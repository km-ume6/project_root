<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>部署選択</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/cards.css">
</head>
<body>

<h1>部署を選択</h1>

<div id="department-container" class="card-grid"></div>

<script src="../js/api.js"></script>
<script src="../js/render_cards.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const location_id = params.get("location_id");

    // ★ location_id が無い場合は拠点選択に戻す（null連鎖を防ぐ）
    if (!location_id || location_id === "null" || location_id.trim() === "") {
        window.location.href = "locations.html";
    }



    loadDepartments(location_id);
</script>

</body>
</html>
