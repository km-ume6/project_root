<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ж‹ з‚№йЃёжЉћ QRг‚ігѓјгѓ‰</title>
    <link rel="stylesheet" href="../css/base.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .qr-sheet {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 32px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .qr-sheet h1 {
            font-size: 1.35rem;
            margin: 0 0 6px;
        }

        .qr-sheet .subtitle {
            color: var(--color-text-muted);
            font-size: 0.95rem;
            margin: 0 0 24px;
        }

        #qrcode {
            display: inline-block;
            padding: 12px;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
        }

        #qrcode canvas,
        #qrcode img {
            display: block;
            width: 260px !important;
            height: 260px !important;
        }

        .url-text {
            margin-top: 18px;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            word-break: break-all;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .actions button,
        .actions a {
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            text-decoration: none;
            border: none;
        }

        .btn-print {
            background: var(--color-primary);
            color: #fff;
        }

        .btn-open {
            background: #f1f5f9;
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        @media print {
            body {
                background: #fff;
                padding: 0;
            }

            .qr-sheet {
                box-shadow: none;
                border: none;
                max-width: none;
            }

            .actions {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="qr-sheet">
    <h1>иЁ­е‚™з‚№ж¤њг‚ўгѓ—гѓЄ</h1>
    <p class="subtitle">ж‹ з‚№йЃёжЉћ</p>

    <p class="url-text" id="targetUrl"></p>
    <div class="actions">
        <button type="button" class="btn-print" onclick="window.print()">еЌ°е€·</button>
        <a class="btn-open" id="openLink" href="#">гѓљгѓјг‚ёг‚’й–‹гЃЏ</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<script>

</script>

</body>
</html>
